name: Release

on:
release:
types:
- published

workflow_dispatch:

permissions:
contents: write

env:
APP_NAME: nbping

jobs:
build:

```
strategy:
  fail-fast: false
  matrix:
    include:
      - os: ubuntu-22.04
        target: x86_64-unknown-linux-musl
        binary: nbping

      - os: windows-latest
        target: x86_64-pc-windows-msvc
        binary: nbping.exe

      - os: macos-latest
        target: x86_64-apple-darwin
        binary: nbping

      - os: macos-latest
        target: aarch64-apple-darwin
        binary: nbping

runs-on: ${{ matrix.os }}

steps:

  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Rust
    uses: dtolnay/rust-toolchain@stable
    with:
      targets: ${{ matrix.target }}

  - name: Cache Cargo
    uses: Swatinem/rust-cache@v2

  - name: Install MUSL
    if: matrix.target == 'x86_64-unknown-linux-musl'
    run: |
      sudo apt-get update
      sudo apt-get install -y musl-tools

  - name: Build
    run: cargo build --release --locked --target ${{ matrix.target }}

  - name: Prepare Artifact
    shell: bash
    run: |
      mkdir -p artifact

      cp target/${{ matrix.target }}/release/${{ matrix.binary }} artifact/

      if [ -f README.md ]; then
        cp README.md artifact/
      fi

      if [ -f LICENSE ]; then
        cp LICENSE artifact/
      fi

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: ${{ matrix.target }}
      path: artifact/
```

release:

```
if: github.event_name == 'release'

needs: build

runs-on: ubuntu-latest

steps:

  - name: Download Artifacts
    uses: actions/download-artifact@v4
    with:
      path: dist

  - name: Set Version
    run: |
      echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

  - name: Package Release Files
    shell: bash
    run: |

      mkdir -p release

      for dir in dist/*; do

        target=$(basename "$dir")

        if [[ "$target" == *windows* ]]; then

          file="${APP_NAME}-${VERSION}-${target}.zip"

          (
            cd "$dir"
            zip -rq "../../release/$file" .
          )

          sha256sum "release/$file" > "release/$file.sha256"

        else

          file="${APP_NAME}-${VERSION}-${target}.tar.gz"

          tar czf \
            "release/$file" \
            -C "$dir" .

          sha256sum "release/$file" > "release/$file.sha256"

        fi

      done

  - name: Generate Release Notes
    shell: bash
    run: |

      cat > RELEASE_NOTES.md <<EOF
      # NBPing ${VERSION}

      ## Supported Platforms

      | Platform | Target |
      |-----------|-----------|
      | Rocky Linux 8 | x86_64-unknown-linux-musl |
      | Rocky Linux 9 | x86_64-unknown-linux-musl |
      | CentOS 7 | x86_64-unknown-linux-musl |
      | Ubuntu | x86_64-unknown-linux-musl |
      | Windows x64 | x86_64-pc-windows-msvc |
      | macOS Intel | x86_64-apple-darwin |
      | macOS Apple Silicon | aarch64-apple-darwin |

      ## Verify

      \`\`\`bash
      sha256sum -c *.sha256
      \`\`\`
      EOF

  - name: Publish Release
    uses: softprops/action-gh-release@v2
    with:
      overwrite_files: true
      body_path: RELEASE_NOTES.md
      files: |
        release/*.tar.gz
        release/*.tar.gz.sha256
        release/*.zip
        release/*.zip.sha256
```
