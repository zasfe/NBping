name: Release

on:
release:
types:
- published

workflow_dispatch:

permissions:
contents: write

env:
APP_NAME: nbping

jobs:

build:

```
strategy:
  fail-fast: false

  matrix:
    include:

      - os: ubuntu-22.04
        target: x86_64-unknown-linux-musl
        ext: tar.gz

      - os: windows-latest
        target: x86_64-pc-windows-msvc
        ext: zip

      - os: macos-latest
        target: x86_64-apple-darwin
        ext: tar.gz

      - os: macos-latest
        target: aarch64-apple-darwin
        ext: tar.gz

runs-on: ${{ matrix.os }}

steps:

  - name: Checkout
    uses: actions/checkout@v4

  - name: Determine Version
    shell: bash
    run: |
      if [ "${{ github.event_name }}" = "release" ]; then
        echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
      else
        echo "VERSION=manual-build" >> $GITHUB_ENV
      fi

  - name: Setup Rust
    uses: dtolnay/rust-toolchain@stable
    with:
      targets: ${{ matrix.target }}

  - name: Cache Cargo
    uses: Swatinem/rust-cache@v2

  - name: Install MUSL
    if: matrix.target == 'x86_64-unknown-linux-musl'
    run: |
      sudo apt-get update
      sudo apt-get install -y musl-tools

  - name: Build
    run: cargo build --release --target ${{ matrix.target }}

  - name: Generate README
    shell: bash
    run: |
      cat > README_RELEASE.md <<'EOF'
      # NBPing

      ## Quick Start

      Linux / macOS

          chmod +x nbping
          ./nbping 8.8.8.8

      Windows

          nbping.exe 8.8.8.8

      Help

          ./nbping --help
      EOF

  - name: Package Linux/macOS
    if: runner.os != 'Windows'
    shell: bash
    run: |

      mkdir package

      cp target/${{ matrix.target }}/release/nbping package/
      cp README_RELEASE.md package/README.md

      if [ -f LICENSE ]; then
        cp LICENSE package/
      fi

      FILE="${APP_NAME}-${VERSION}-${{ matrix.target }}.tar.gz"

      tar czf "$FILE" -C package .

      sha256sum "$FILE" > "$FILE.sha256"

  - name: Package Windows
    if: runner.os == 'Windows'
    shell: pwsh
    run: |

      New-Item `
        -ItemType Directory `
        -Force `
        package | Out-Null

      Copy-Item `
        target\${{ matrix.target }}\release\nbping.exe `
        package\

      Copy-Item `
        README_RELEASE.md `
        package\README.md

      if (Test-Path LICENSE) {
        Copy-Item LICENSE package\
      }

      $File = "${env:APP_NAME}-${env:VERSION}-${{ matrix.target }}.zip"

      Compress-Archive `
        -Path package\* `
        -DestinationPath $File `
        -Force

      (Get-FileHash `
        -Algorithm SHA256 `
        $File).Hash | Out-File "$File.sha256"

  - name: Upload Artifacts
    uses: actions/upload-artifact@v4
    with:
      name: ${{ matrix.target }}
      path: |
        *.tar.gz
        *.tar.gz.sha256
        *.zip
        *.zip.sha256
```

release:

```
if: github.event_name == 'release'

needs: build

runs-on: ubuntu-latest

steps:

  - name: Download Artifacts
    uses: actions/download-artifact@v4
    with:
      path: dist

  - name: Generate Release Notes
    shell: bash
    run: |

      VERSION="${{ github.event.release.tag_name }}"

      cat > RELEASE_NOTES.md <<EOF
      # NBPing ${VERSION}

      ## 지원 플랫폼

      | 플랫폼 | 파일 |
      |----------|----------|
      | Rocky Linux 8 | x86_64-unknown-linux-musl |
      | Rocky Linux 9 | x86_64-unknown-linux-musl |
      | AlmaLinux | x86_64-unknown-linux-musl |
      | Oracle Linux | x86_64-unknown-linux-musl |
      | Ubuntu | x86_64-unknown-linux-musl |
      | CentOS 7 | x86_64-unknown-linux-musl |
      | Windows x64 | x86_64-pc-windows-msvc |
      | macOS Intel | x86_64-apple-darwin |
      | macOS Apple Silicon | aarch64-apple-darwin |

      ## Quick Start

      Linux / macOS

          tar xzf nbping-*.tar.gz
          chmod +x nbping
          ./nbping 8.8.8.8

      Windows

          nbping.exe 8.8.8.8

      ## SHA256 검증

          sha256sum -c *.sha256
      EOF

  - name: Publish Release Assets
    uses: softprops/action-gh-release@v2
    with:
      body_path: RELEASE_NOTES.md
      files: |
        dist/**/*.tar.gz
        dist/**/*.tar.gz.sha256
        dist/**/*.zip
        dist/**/*.zip.sha256
