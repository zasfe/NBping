name: Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:

    strategy:
      fail-fast: false

      matrix:
        include:

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            archive: tar.gz

          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true

          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            cross: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install MUSL Tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Cross
        if: matrix.cross == true
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Native
        if: matrix.cross != true
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Build Cross
        if: matrix.cross == true
        run: |
          cross build --release --target ${{ matrix.target }}

      - name: Package Linux/macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir package

          cp target/${{ matrix.target }}/release/nbping package/

          tar czf \
            nbping-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            -C package .

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          mkdir package

          Copy-Item `
            target\${{ matrix.target }}\release\nbping.exe `
            package\

          Compress-Archive `
            -Path package\* `
            -DestinationPath nbping-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload Artifact Linux/macOS
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"

      - name: Upload Artifact Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.zip"

  release:

    needs: build

    if: startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - run: |
          echo "=== RELEASE FILES ==="
          find dist -type f

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
